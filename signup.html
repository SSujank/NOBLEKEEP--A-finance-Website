<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — NOBLEKEEP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/pages.css">
<script src="js/data.js"></script>
<script src="js/utils.js"></script>
<script src="js/nav.js"></script>
</head>
<body>

<main class="auth-shell">
  <div class="auth-panel-left">
    <div class="auth-card">
      <a class="auth-logo-link" href="index.html">
        <div class="auth-logo-mark">♛</div>
        <div class="auth-logo-name">NOBLEKEEP</div>
      </a>
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-sub">Begin your sovereign financial journey</p>

      <div class="err-box" id="signupErr"></div>

      <div class="auth-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="Your Royal Name" autocomplete="name">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="signupEmail" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPass" placeholder="Min. 6 characters" autocomplete="new-password">
        </div>
        <button class="btn btn-gold" onclick="doSignup()">Create Account</button>
      </div>

      <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>

  <div class="auth-panel-right">
    <div class="auth-visual">
      <div class="auth-quote">"The first step to financial freedom is knowing where you stand."</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:var(--sp-md)">Everything stored locally in your browser. Zero data sent to any server.</p>
      <div class="auth-stat-row">
        <div class="auth-stat">
          <div class="auth-stat-num">AI</div>
          <div class="auth-stat-lbl">Personal advisor</div>
        </div>
        <div class="auth-stat">
          <div class="auth-stat-num">∞</div>
          <div class="auth-stat-lbl">Transactions</div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', () => {
  if (Auth.loggedIn) window.location.replace('dashboard.html');
  document.getElementById('signupPass').addEventListener('keydown', e => { if(e.key==='Enter') doSignup(); });
});

function doSignup() {
  const name  = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const pass  = document.getElementById('signupPass').value;
  const err   = document.getElementById('signupErr');
  err.classList.remove('show');
  if (!name||!email||!pass) { err.textContent='Please fill in all fields.'; err.classList.add('show'); return; }
  if (pass.length<6) { err.textContent='Password must be at least 6 characters.'; err.classList.add('show'); return; }
  const res = Auth.signup(name, email, pass);
  if (res.ok) {
    window.location.replace('dashboard.html');
  } else {
    err.textContent = res.msg;
    err.classList.add('show');
  }
}
</script>
</body>
</html>
